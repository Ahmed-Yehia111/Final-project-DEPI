name: Deploy PneumoScope to Azure

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      resource_group:
        description: Azure resource group to provision/deploy into
        required: false
        default: rg-pneumoscope
      location:
        description: Azure region used when the resource group is created
        required: false
        default: eastus

env:
  AZURE_RESOURCE_GROUP: ${{ inputs.resource_group || vars.AZURE_RESOURCE_GROUP || 'rg-pneumoscope' }}
  AZURE_LOCATION: ${{ inputs.location || vars.AZURE_LOCATION || 'eastus' }}
  AZURE_WEBAPP_NAME: ${{ vars.AZURE_WEBAPP_NAME || 'pneumoscope' }}
  IMAGE_NAME: pneumoscope

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

  deploy:
    runs-on: ubuntu-latest
    needs: validate
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID || secrets.AZUREAPPSERVICE_CLIENTID_0823DC8829FB4BA88307EE7062C7B689 }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID || secrets.AZUREAPPSERVICE_TENANTID_3BB600FAA3E7487797B5F801B5BF9433 }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID || secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_297163CF8F1145D9AC68B66EEC52B1A7 }}

      - name: Provision Azure resources
        run: |
          az group create \
            --name "$AZURE_RESOURCE_GROUP" \
            --location "$AZURE_LOCATION"

          az deployment group create \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --name "pneumoscope-${GITHUB_RUN_ID}" \
            --template-file infra/main.bicep \
            --parameters appName="$AZURE_WEBAPP_NAME" modelUrl="${{ secrets.MODEL_URL }}"

      - name: Read deployment outputs
        id: azure_outputs
        run: |
          ACR_NAME=$(az deployment group show \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --name "pneumoscope-${GITHUB_RUN_ID}" \
            --query "properties.outputs.acrName.value" \
            --output tsv)

          APP_NAME=$(az deployment group show \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --name "pneumoscope-${GITHUB_RUN_ID}" \
            --query "properties.outputs.webAppName.value" \
            --output tsv)

          ACR_LOGIN_SERVER=$(az deployment group show \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --name "pneumoscope-${GITHUB_RUN_ID}" \
            --query "properties.outputs.acrLoginServer.value" \
            --output tsv)

          echo "acr_name=$ACR_NAME" >> "$GITHUB_OUTPUT"
          echo "app_name=$APP_NAME" >> "$GITHUB_OUTPUT"
          echo "acr_login_server=$ACR_LOGIN_SERVER" >> "$GITHUB_OUTPUT"

      - name: Build and push image in Azure Container Registry
        run: |
          az acr build \
            --registry "${{ steps.azure_outputs.outputs.acr_name }}" \
            --image "$IMAGE_NAME:${GITHUB_SHA}" \
            --image "$IMAGE_NAME:latest" \
            .

      - name: Deploy container to App Service
        run: |
          IMAGE="${{ steps.azure_outputs.outputs.acr_login_server }}/$IMAGE_NAME:${GITHUB_SHA}"

          az webapp config container set \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --name "${{ steps.azure_outputs.outputs.app_name }}" \
            --container-image-name "$IMAGE" \
            --container-registry-url "https://${{ steps.azure_outputs.outputs.acr_login_server }}"

          az webapp restart \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --name "${{ steps.azure_outputs.outputs.app_name }}"

      - name: Show app URL
        run: |
          echo "https://${{ steps.azure_outputs.outputs.app_name }}.azurewebsites.net"
